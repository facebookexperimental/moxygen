name: sync auto-merge

# Fires when OpenMOQ CI completes on a sync/* branch.
# If CI passed, merges the corresponding open sync PR into main.
#
# This handles auto-merge reliably via the REST merge API, avoiding the
# enablePullRequestAutoMerge GraphQL mutation which is unreliable with PATs.
#
# NOTE: This workflow runs from the default branch (workflow_run events always
# use the default branch). The sync PR must already be approved before CI runs.

on:
  workflow_run:
    workflows: ["pull request ci"]
    types: [completed]
    branches:
      - sync/**

permissions:
  contents: write
  pull-requests: write

jobs:
  notify-ci-failure:
    runs-on: ubuntu-22.04
    if: |
      github.event.workflow_run.conclusion != 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'sync/')
    steps:
      - name: Find sync PR
        id: find-pr
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUM=$(gh api "repos/${REPO}/pulls?state=open&base=main" \
            --jq "[.[] | select(.head.ref == \"${HEAD_BRANCH}\")] | .[0].number // empty")
          echo "pr_num=${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack (sync CI failure)
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26
        with:
          payload: |
            {
              "text": ":x: *moxygen sync CI failed* — `${{ github.event.workflow_run.head_branch }}` needs conflict resolution\n<${{ github.server_url }}/${{ github.repository }}/pull/${{ steps.find-pr.outputs.pr_num }}|View PR> · <${{ github.event.workflow_run.html_url }}|View CI run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.OMOQ_SLACK_WEBHOOK_URL }}

  auto-merge:
    runs-on: ubuntu-22.04
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'sync/')

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.OMOQ_APP_ID }}
          private-key: ${{ secrets.OMOQ_APP_PRIV_KEY }}

      - name: Find and merge sync PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "CI passed on ${HEAD_BRANCH} (${HEAD_SHA})"

          # Find open sync PR from this branch targeting main,
          # matching the exact SHA that CI ran on.
          PR_NUM=$(gh api \
            "repos/${REPO}/pulls?state=open&base=main" \
            --jq "[.[] | select(.head.ref == \"${HEAD_BRANCH}\" and .head.sha == \"${HEAD_SHA}\")] | .[0].number // empty")

          if [ -z "$PR_NUM" ]; then
            echo "No open sync PR found for ${HEAD_BRANCH} at ${HEAD_SHA}. Nothing to do."
            exit 0
          fi

          echo "Merging sync PR #${PR_NUM}..."
          gh pr merge "${PR_NUM}" --merge --repo "${REPO}"
          echo "Merged PR #${PR_NUM}."
