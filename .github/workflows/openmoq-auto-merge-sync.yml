name: OpenMOQ Auto-Merge Sync

# Fires when OpenMOQ CI completes on a sync/* branch.
# If CI passed, merges the corresponding open sync PR into openmoq-main.
#
# This handles auto-merge reliably via the REST merge API, avoiding the
# enablePullRequestAutoMerge GraphQL mutation which is unreliable with PATs.
#
# NOTE: This workflow runs from openmoq-main (workflow_run events always use
# the default branch). The sync PR must already be approved before CI runs.

on:
  workflow_run:
    workflows: ["OpenMOQ CI"]
    types: [completed]
    branches:
      - sync/**

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-22.04
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'sync/')

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.OMOQ_APP_ID }}
          private-key: ${{ secrets.OMOQ_APP_PRIV_KEY }}

      - name: Find and merge sync PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "CI passed on ${HEAD_BRANCH} (${HEAD_SHA})"

          # Find open sync PR from this branch targeting openmoq-main,
          # matching the exact SHA that CI ran on.
          PR_NUM=$(gh api \
            "repos/${REPO}/pulls?state=open&base=openmoq-main" \
            --jq "[.[] | select(.head.ref == \"${HEAD_BRANCH}\" and .head.sha == \"${HEAD_SHA}\")] | .[0].number // empty")

          if [ -z "$PR_NUM" ]; then
            echo "No open sync PR found for ${HEAD_BRANCH} at ${HEAD_SHA}. Nothing to do."
            exit 0
          fi

          echo "Merging sync PR #${PR_NUM}..."
          gh pr merge "${PR_NUM}" --merge --repo "${REPO}"
          echo "Merged PR #${PR_NUM}."
