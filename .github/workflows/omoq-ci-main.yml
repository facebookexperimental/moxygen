name: ci main

# Full pipeline on push to main: build/test, publish BUNDLE_DEPS artifacts,
# release snapshot, notify. PRs use omoq-ci-pr.yml (build/test only).
#
# Job graph:
#
#   build (linux, macos, asan debug) ───────────────────┐
#   build-pico (linux, macos) ──────────────────────────┼── release ── notify
#   publish (4 platforms, needs: [build]) ──────────────┘  (snapshot)  (always)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  checks: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Verify: build/test matrix
  # ════════════════════════════════════════════════════════════════════════════

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            cache_prefix: ci-ninja-ubuntu-22.04
          - os: macos-15
            name: macos
            cache_prefix: ci-ninja-macos-15
          - os: ubuntu-22.04
            name: asan debug
            cache_prefix: ci-asan-ubuntu-22.04
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: bash standalone/install-system-deps.sh

      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: _build/_deps
          key: ${{ matrix.cache_prefix }}-deps-${{ hashFiles('build/deps/github_hashes/**/*-rev.txt', 'standalone/patches/**') }}
          restore-keys: |
            ${{ matrix.cache_prefix }}-deps-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.cache_prefix }}
          max-size: 500M

      - name: Configure
        run: |
          if [ "${{ matrix.name }}" = "asan debug" ]; then
            cmake -B _build -S standalone -G Ninja \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
              -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
              -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
              -DBUILD_TESTING=ON
          else
            cmake -B _build -S standalone -G Ninja \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DBUILD_TESTING=ON \
              -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/_install
          fi

      - name: Build
        run: cmake --build _build -j$(getconf _NPROCESSORS_ONLN)

      - name: Test
        env:
          ASAN_OPTIONS: ${{ matrix.name == 'asan debug' && 'detect_leaks=1:abort_on_error=1' || '' }}
        run: ctest --test-dir _build --output-on-failure --output-junit test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1.9.1
        if: success() || failure()
        with:
          name: "test (${{ matrix.name }})"
          path: _build/test-results.xml
          reporter: java-junit

      - name: Install (smoke test)
        if: matrix.name != 'asan debug'
        run: cmake --install _build

  build-pico:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            cache_prefix: ci-pico-ninja-ubuntu-22.04
          - os: macos-15
            name: macos
            cache_prefix: ci-pico-ninja-macos-15
    name: pico (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: bash standalone/install-system-deps.sh

      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: _build/_deps
          key: ${{ matrix.cache_prefix }}-deps-${{ hashFiles('build/deps/github_hashes/**/*-rev.txt', 'standalone/patches/**') }}
          restore-keys: |
            ${{ matrix.cache_prefix }}-deps-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.cache_prefix }}
          max-size: 500M

      - name: Configure
        run: |
          cmake -B _build -S standalone -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_TESTING=ON \
            -DBUILD_PICOQUIC=ON \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/_install

      - name: Build
        run: cmake --build _build -j$(getconf _NPROCESSORS_ONLN)

      - name: Test
        run: ctest --test-dir _build --output-on-failure --output-junit test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1.9.1
        if: success() || failure()
        with:
          name: "test pico (${{ matrix.name }})"
          path: _build/test-results.xml
          reporter: java-junit

      - name: Install (smoke test)
        run: cmake --install _build

  # ════════════════════════════════════════════════════════════════════════════
  # Publish: BUNDLE_DEPS artifact builds (main only, needs verify to pass)
  # ════════════════════════════════════════════════════════════════════════════

  publish:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04-amd64
            runner: ubuntu-22.04
            artifact: moxygen-ubuntu-22.04-amd64.tar.gz
            debug_artifact: moxygen-ubuntu-22.04-amd64-dbg.tar.gz
            container: ""

          - name: macos-15-arm64
            runner: macos-15
            artifact: moxygen-macos-15-arm64.tar.gz
            debug_artifact: moxygen-macos-15-arm64-dbg.tar.gz
            container: ""

          - name: bookworm-amd64
            runner: ubuntu-22.04
            artifact: moxygen-bookworm-amd64.tar.gz
            debug_artifact: moxygen-bookworm-amd64-dbg.tar.gz
            container: debian:bookworm

          - name: bookworm-arm64
            runner: ubuntu-22.04-arm
            artifact: moxygen-bookworm-arm64.tar.gz
            debug_artifact: moxygen-bookworm-arm64-dbg.tar.gz
            container: debian:bookworm

    name: publish (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || null }}

    steps:
      - uses: actions/checkout@v4

      - name: Install container base deps
        if: matrix.container != ''
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates curl pkg-config sudo

      - name: Install system dependencies
        run: bash standalone/install-system-deps.sh

      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: _build/_deps
          key: publish-ninja-${{ matrix.name }}-deps-${{ hashFiles('build/deps/github_hashes/**/*-rev.txt', 'standalone/patches/**') }}
          restore-keys: |
            publish-ninja-${{ matrix.name }}-deps-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: publish-${{ matrix.name }}
          max-size: 500M

      - name: Configure
        run: |
          cmake -B _build -S standalone -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUNDLE_DEPS=ON \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/install"

      - name: Build
        run: cmake --build _build -j$(getconf _NPROCESSORS_ONLN)

      - name: Install
        run: cmake --install _build

      - name: Package
        run: |
          bash openmoq/scripts/collect-artifacts-standalone.sh \
            --install-prefix "$GITHUB_WORKSPACE/install" \
            --output "${{ matrix.artifact }}" \
            --debug-output "${{ matrix.debug_artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 90

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.debug_artifact }}
          path: ${{ matrix.debug_artifact }}
          retention-days: 90

  # ════════════════════════════════════════════════════════════════════════════
  # Release: create/update snapshot-latest pre-release (main only, all green)
  # ════════════════════════════════════════════════════════════════════════════

  release:
    needs: [build, build-pico, publish]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Publish snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash openmoq/scripts/publish-artifacts.sh \
            --artifacts-dir artifacts/ \
            --sha "$GITHUB_SHA"

  # ════════════════════════════════════════════════════════════════════════════
  # Notify: aggregate status (main only, runs after everything)
  # ════════════════════════════════════════════════════════════════════════════

  notify:
    needs: [build, build-pico, publish, release]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Notify Slack
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.OMOQ_SLACK_WEBHOOK_URL }}
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Map job results to status symbols
          fmt_status() {
            case "$1" in
              success)   echo "✓" ;;
              failure)   echo "✗" ;;
              cancelled) echo "⊘" ;;
              *)         echo "—" ;;
            esac
          }

          VER=$(fmt_status "${{ needs.build.result }}")
          PICO=$(fmt_status "${{ needs.build-pico.result }}")
          PUB=$(fmt_status "${{ needs.publish.result }}")
          REL=$(fmt_status "${{ needs.release.result }}")

          STATUS="verify:${VER} pico:${PICO} publish:${PUB} release:${REL}"

          if [ "${{ needs.release.result }}" = "success" ]; then
            REL_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/snapshot-latest"
            TEXT=":white_check_mark: *${{ github.repository }}* \`${{ github.ref_name }}\` \`${SHORT}\` — ${STATUS}  <${RUN_URL}|#${{ github.run_number }}> artifacts: <${REL_URL}|view>"
          else
            TEXT=":x: *${{ github.repository }}* \`${{ github.ref_name }}\` \`${SHORT}\` — ${STATUS}  <${RUN_URL}|#${{ github.run_number }}>"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "{\"text\": \"${TEXT}\"}"

      - name: Notify email
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OMOQ_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OMOQ_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          VER="${{ needs.build.result }}"
          PICO="${{ needs.build-pico.result }}"
          PUB="${{ needs.publish.result }}"
          REL="${{ needs.release.result }}"

          STATUS="verify:${VER} pico:${PICO} publish:${PUB} release:${REL}"

          if [ "${{ needs.release.result }}" = "success" ]; then
            REL_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/snapshot-latest"
            SUBJECT="[moxygen] published ${{ github.ref_name }} ${SHORT}"
            BODY="Repository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${GITHUB_SHA}\nStatus: ${STATUS}\nArtifacts: ${REL_URL}\nRun: ${RUN_URL}"
          else
            SUBJECT="[moxygen] pipeline failed ${{ github.ref_name }} ${SHORT}"
            BODY="Repository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${GITHUB_SHA}\nStatus: ${STATUS}\nRun: ${RUN_URL}"
          fi

          aws ses send-email \
            --from "noreply@ci.openmoq.org" \
            --destination '{"ToAddresses":["github-notifications@openmoq.org"]}' \
            --message "{
              \"Subject\": {\"Data\": \"${SUBJECT}\"},
              \"Body\": {\"Text\": {\"Data\": \"${BODY}\"}}
            }"
