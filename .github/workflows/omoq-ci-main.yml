name: ci main

# Full pipeline on push to main or release/** branches: build/test, publish
# BUNDLE_DEPS artifacts, release snapshot, notify. PRs use omoq-ci-pr.yml
# (build/test only).
#
# main           → snapshot-latest pre-release
# release/<lbl>  → snapshot-<lbl>-latest pre-release (independent namespace)
#
# Job graph:
#
#   build (linux, macos, asan debug) ─────────────────────────────────────────┐
#   publish (3 platforms) ───────────────────────────────────────────────────┼── release ── notify

on:
  push:
    branches: [main, 'release/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  checks: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Verify: build/test matrix
  # ════════════════════════════════════════════════════════════════════════════

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            name: linux
            cache_prefix: ci-ninja-ubuntu-22.04
          - runner: macos-15
            name: macos
            cache_prefix: ci-ninja-macos-15
          - runner: [self-hosted, linode]
            name: asan debug
            cache_prefix: ci-asan-ubuntu-22.04
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Fix workspace ownership (self-hosted)
        if: ${{ contains(toJSON(matrix.runner), 'linode') }}
        run: |
          sudo rm -rf "$GITHUB_WORKSPACE/_build" "$GITHUB_WORKSPACE/_install"
          sudo chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4

      - name: Install system dependencies
        if: ${{ !contains(toJSON(matrix.runner), 'linode') }}
        run: bash standalone/install-system-deps.sh

      - name: Cache FetchContent downloads
        if: ${{ !contains(toJSON(matrix.runner), 'linode') }}
        uses: actions/cache@v4
        with:
          path: _build/_deps
          key: ${{ matrix.cache_prefix }}-deps-${{ hashFiles('build/deps/github_hashes/**/*-rev.txt', 'standalone/patches/**') }}
          restore-keys: |
            ${{ matrix.cache_prefix }}-deps-

      - name: Set up ccache
        if: ${{ !contains(toJSON(matrix.runner), 'linode') }}
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.cache_prefix }}
          max-size: 500M

      - name: Configure
        run: |
          ASAN_FLAGS=()
          EXTRA_FLAGS=()
          if [ "${{ matrix.name }}" = "asan debug" ]; then
            ASAN_FLAGS=(
              -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer"
              -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer"
              -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
            )
          fi
          # On self-hosted: persist FetchContent outside workspace (namespaced
          # per job to avoid collisions with other builds on the same runner)
          if echo '${{ toJSON(matrix.runner) }}' | grep -q linode; then
            EXTRA_FLAGS+=(-DFETCHCONTENT_BASE_DIR="$HOME/.cache/moxygen-${{ matrix.cache_prefix }}/_deps")
          fi
          cmake -B _build -S standalone -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=ON \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/_install \
            "${ASAN_FLAGS[@]}" "${EXTRA_FLAGS[@]}"

      - name: Build
        # Linode (asan debug): -j(n-2) reserves 2 cores for co-resident workloads.
        run: |
          if [ "${{ matrix.name }}" = "asan debug" ]; then
            cmake --build _build -j$(( $(getconf _NPROCESSORS_ONLN) - 2 ))
          else
            cmake --build _build -j$(getconf _NPROCESSORS_ONLN)
          fi

      - name: Test
        env:
          ASAN_OPTIONS: ${{ matrix.name == 'asan debug' && 'detect_leaks=1:abort_on_error=1' || '' }}
        run: ctest --test-dir _build --output-on-failure --output-junit test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1.9.1
        if: success() || failure()
        with:
          name: "test (${{ matrix.name }})"
          path: _build/test-results.xml
          reporter: java-junit

      - name: Install (smoke test)
        if: matrix.name != 'asan debug'
        run: cmake --install _build

  # ════════════════════════════════════════════════════════════════════════════
  # Publish: BUNDLE_DEPS artifact builds (needs verify to pass)
  # ════════════════════════════════════════════════════════════════════════════

  publish:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04-amd64
            runner: ubuntu-22.04
            artifact: moxygen-ubuntu-22.04-amd64.tar.gz
            debug_artifact: moxygen-ubuntu-22.04-amd64-dbg.tar.gz
            container: ""

          - name: macos-15-arm64
            runner: macos-15
            artifact: moxygen-macos-15-arm64.tar.gz
            debug_artifact: moxygen-macos-15-arm64-dbg.tar.gz
            container: ""

          - name: bookworm-amd64
            runner: [self-hosted, linode]
            artifact: moxygen-bookworm-amd64.tar.gz
            debug_artifact: moxygen-bookworm-amd64-dbg.tar.gz
            container: debian:bookworm
            cache_opts: "-v /home/github-runner/.cache/moxygen-publish-bookworm-amd64:/cache"

          - name: bookworm-arm64
            runner: ubuntu-22.04-arm
            artifact: moxygen-bookworm-arm64.tar.gz
            debug_artifact: moxygen-bookworm-arm64-dbg.tar.gz
            container: debian:bookworm

    name: publish (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.container || null }}
      options: ${{ matrix.cache_opts || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install container base deps
        if: matrix.container != ''
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates curl pkg-config sudo bash ccache

      - name: Install system dependencies
        if: ${{ !contains(toJSON(matrix.runner), 'linode') || matrix.container != '' }}
        run: bash standalone/install-system-deps.sh

      - name: Cache FetchContent downloads
        if: ${{ !contains(toJSON(matrix.runner), 'linode') }}
        uses: actions/cache@v4
        with:
          path: _build/_deps
          key: publish-ninja-${{ matrix.name }}-deps-${{ hashFiles('build/deps/github_hashes/**/*-rev.txt', 'standalone/patches/**') }}
          restore-keys: |
            publish-ninja-${{ matrix.name }}-deps-

      - name: Set up ccache
        if: ${{ !contains(toJSON(matrix.runner), 'linode') }}
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: publish-${{ matrix.name }}
          max-size: 500M

      - name: Configure
        shell: bash
        run: |
          EXTRA_FLAGS=()
          # On self-hosted with volume mount: persist FetchContent + ccache
          if [ -d /cache ]; then
            mkdir -p /cache/_deps /cache/ccache
            export CCACHE_DIR=/cache/ccache
            EXTRA_FLAGS+=(-DFETCHCONTENT_BASE_DIR=/cache/_deps)
          elif echo '${{ toJSON(matrix.runner) }}' | grep -q linode; then
            # Self-hosted without container: use home dir
            EXTRA_FLAGS+=(-DFETCHCONTENT_BASE_DIR="$HOME/.cache/moxygen-publish-${{ matrix.name }}/_deps")
          fi
          cmake -B _build -S standalone -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUNDLE_DEPS=ON \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/install" \
            "${EXTRA_FLAGS[@]}"

      - name: Build
        # Linode: -j(n-2) reserves cores for co-resident workloads (e.g. relay).
        run: |
          if echo '${{ toJSON(matrix.runner) }}' | grep -q linode; then
            cmake --build _build -j$(( $(getconf _NPROCESSORS_ONLN) - 2 ))
          else
            cmake --build _build -j$(getconf _NPROCESSORS_ONLN)
          fi

      - name: Install
        run: cmake --install _build

      - name: Package
        run: |
          bash openmoq/scripts/collect-artifacts-standalone.sh \
            --install-prefix "$GITHUB_WORKSPACE/install" \
            --output "${{ matrix.artifact }}" \
            --debug-output "${{ matrix.debug_artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 90

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.debug_artifact }}
          path: ${{ matrix.debug_artifact }}
          retention-days: 90

  # ════════════════════════════════════════════════════════════════════════════
  # Release: create/update branch-derived snapshot pre-release (all green)
  #   main           → snapshot-latest
  #   release/<lbl>  → snapshot-<lbl>-latest
  # ════════════════════════════════════════════════════════════════════════════

  release:
    needs: [build, publish]
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Compute release tag
        id: tag
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            TAG="snapshot-latest"
          else
            # release/nab-demo → snapshot-nab-demo-latest
            LABEL="${BRANCH#release/}"
            TAG="snapshot-${LABEL}-latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG (branch: $BRANCH)"

      - name: Publish snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash openmoq/scripts/publish-artifacts.sh \
            --artifacts-dir artifacts/ \
            --sha "$GITHUB_SHA" \
            --tag "${{ steps.tag.outputs.tag }}" \
            --branch "${{ github.ref_name }}"

  # ════════════════════════════════════════════════════════════════════════════
  # Notify: aggregate status (runs after everything)
  # ════════════════════════════════════════════════════════════════════════════

  notify:
    needs: [build, publish, release]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      # Note: moqx submodule sync is now driven by a daily cron in
      # moqx/.github/workflows/moxygen-sync.yml (cascade stage 4 at
      # 09:35 UTC) rather than per-merge repository_dispatch from here.
      # See the cascade comment block in omoq-upstream-sync.yml.

      # ── Notifications ──
      - name: Notify Slack
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.OMOQ_SLACK_WEBHOOK_URL }}
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Map job results to status symbols
          fmt_status() {
            case "$1" in
              success)   echo "✓" ;;
              failure)   echo "✗" ;;
              cancelled) echo "⊘" ;;
              *)         echo "—" ;;
            esac
          }

          VER=$(fmt_status "${{ needs.build.result }}")
          PUB=$(fmt_status "${{ needs.publish.result }}")
          REL=$(fmt_status "${{ needs.release.result }}")

          STATUS="verify:${VER} publish:${PUB} release:${REL}"

          if [ "${{ needs.release.result }}" = "success" ]; then
            REL_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.release.outputs.tag }}"
            TEXT=":white_check_mark: *${{ github.repository }}* \`${{ github.ref_name }}\` \`${SHORT}\` — ${STATUS}  <${RUN_URL}|#${{ github.run_number }}> artifacts: <${REL_URL}|view>"
          else
            TEXT=":x: *${{ github.repository }}* \`${{ github.ref_name }}\` \`${SHORT}\` — ${STATUS}  <${RUN_URL}|#${{ github.run_number }}>"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "{\"text\": \"${TEXT}\"}"

      - name: Notify email
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OMOQ_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OMOQ_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          VER="${{ needs.build.result }}"
          PUB="${{ needs.publish.result }}"
          REL="${{ needs.release.result }}"

          STATUS="verify:${VER} publish:${PUB} release:${REL}"

          if [ "${{ needs.release.result }}" = "success" ]; then
            REL_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.release.outputs.tag }}"
            SUBJECT="[moxygen] published ${{ github.ref_name }} ${SHORT}"
            BODY="Repository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${GITHUB_SHA}\nStatus: ${STATUS}\nArtifacts: ${REL_URL}\nRun: ${RUN_URL}"
          else
            SUBJECT="[moxygen] pipeline failed ${{ github.ref_name }} ${SHORT}"
            BODY="Repository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${GITHUB_SHA}\nStatus: ${STATUS}\nRun: ${RUN_URL}"
          fi

          aws ses send-email \
            --from "noreply@ci.openmoq.org" \
            --destination '{"ToAddresses":["github-notifications@openmoq.org"]}' \
            --message "{
              \"Subject\": {\"Data\": \"${SUBJECT}\"},
              \"Body\": {\"Text\": {\"Data\": \"${BODY}\"}}
            }"
