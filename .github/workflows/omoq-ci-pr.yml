name: ci pr

# PR verification: build/test matrix.
# Main push uses omoq-ci-main.yml which adds publish/release/notify.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Verify: build/test matrix
  # ════════════════════════════════════════════════════════════════════════════

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            cache_prefix: ci-ninja-ubuntu-22.04
          - os: macos-15
            name: macos
            cache_prefix: ci-ninja-macos-15
          - os: ubuntu-22.04
            name: asan debug
            cache_prefix: ci-asan-ubuntu-22.04
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: bash standalone/install-system-deps.sh

      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: _build/_deps
          key: ${{ matrix.cache_prefix }}-deps-${{ hashFiles('build/deps/github_hashes/**/*-rev.txt', 'standalone/patches/**') }}
          restore-keys: |
            ${{ matrix.cache_prefix }}-deps-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.cache_prefix }}
          max-size: 500M

      - name: Configure
        run: |
          ASAN_FLAGS=()
          if [ "${{ matrix.name }}" = "asan debug" ]; then
            ASAN_FLAGS=(
              -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer"
              -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer"
              -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
            )
          fi
          cmake -B _build -S standalone -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=ON \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/_install \
            "${ASAN_FLAGS[@]}"

      - name: Build
        # asan debug on the 16 GB Linode runner OOMs under -j$(nproc)
        # during test compilation (cc1plus killed). Match the publish-job
        # cap of -j6 to leave memory headroom.
        run: |
          if [ "${{ matrix.name }}" = "asan debug" ]; then
            cmake --build _build -j6
          else
            cmake --build _build -j$(getconf _NPROCESSORS_ONLN)
          fi

      - name: Test
        env:
          ASAN_OPTIONS: ${{ matrix.name == 'asan debug' && 'detect_leaks=1:abort_on_error=1' || '' }}
        run: ctest --test-dir _build --output-on-failure --output-junit test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1.9.1
        if: success() || failure()
        with:
          name: "test (${{ matrix.name }})"
          path: _build/test-results.xml
          reporter: java-junit

      - name: Install (smoke test)
        if: matrix.name != 'asan debug'
        run: cmake --install _build
